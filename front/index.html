<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NannoSchedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="toast-container"></div>

<div id="app">
    <div class="header" style="position: relative;">
        <div v-if="store.currentTab === 'other' && store.currentSubPage" class="back-btn" @click="store.currentSubPage = ''">◀ 返回</div>
        {{ pageTitle }}
    </div>

    <div class="content-area" :class="{ 'lock-scroll': store.currentTab === 'schedule' && store.scheduleViewType === 'fixed' }">

        <schedule-view v-if="store.currentTab === 'schedule'"></schedule-view>

        <div v-show="store.currentTab === 'other'" style="height: 100%; overflow-y: auto;">
            <div v-show="!store.currentSubPage" class="other-container">
                <div class="feature-group-title">常用查询</div>
                <div class="feature-grid">
                    <div class="feature-card" @click="store.currentSubPage = 'exams'"><div class="feature-icon">📝</div><div class="feature-name">考试安排</div></div>
                    <div class="feature-card" @click="store.currentSubPage = 'grades'"><div class="feature-icon">🏆</div><div class="feature-name">成绩查询</div></div>
                    <div class="feature-card" @click="store.currentSubPage = 'level_exams'"><div class="feature-icon">🏅</div><div class="feature-name">等级考试</div></div>
                    <div class="feature-card" @click="store.currentSubPage = 'books'"><div class="feature-icon">📚</div><div class="feature-name">图书查询</div></div>
                    <div class="feature-card" @click="store.currentSubPage = 'empty_rooms'"><div class="feature-icon">🚪</div><div class="feature-name">空闲教室</div></div>
                    <div class="feature-card" @click="store.currentSubPage = 'public_course'"><div class="feature-icon">🎒</div><div class="feature-name">蹭课查询</div></div>
                    <div class="feature-card" @click="store.currentSubPage = 'websites'"><div class="feature-icon">🌐</div><div class="feature-name">常用网站</div></div>
                    <div class="feature-card" @click="store.currentSubPage = 'school_calendar'"><div class="feature-icon">📅</div><div class="feature-name">学校年历</div></div>
                    <div class="feature-card" style="opacity: 0.5;"><div class="feature-icon">🚪</div><div class="feature-name">敬请期待</div></div>

                </div>
            </div>

            <grades-view v-if="store.currentSubPage === 'grades'"></grades-view>
            <exams-view v-if="store.currentSubPage === 'exams'"></exams-view>
            <level-exams-view v-if="store.currentSubPage === 'level_exams'"></level-exams-view>
            <library-view v-if="store.currentSubPage === 'books'"></library-view>
            <websites-view v-if="store.currentSubPage === 'websites'"></websites-view>
            <public-course-view v-if="store.currentSubPage === 'public_course'"></public-course-view>
            <empty-rooms-view v-if="store.currentSubPage === 'empty_rooms'"></empty-rooms-view>
            <school-calendar-view v-if="store.currentSubPage === 'school_calendar'"></school-calendar-view>
        </div>

        <profile-view v-show="store.currentTab === 'profile'"></profile-view>

    </div>

    <div class="tabbar">
        <div class="tab-item" :class="{ active: store.currentTab === 'schedule' }" @click="store.currentTab = 'schedule'"><div class="tab-icon">📅</div><span>课表</span></div>
        <div class="tab-item" :class="{ active: store.currentTab === 'other' }" @click="store.currentTab = 'other'"><div class="tab-icon">✨</div><span>其他</span></div>
        <div class="tab-item" :class="{ active: store.currentTab === 'profile' }" @click="store.currentTab = 'profile'"><div class="tab-icon">⚙️</div><span>我的</span></div>
    </div>
</div>

<script src="./js/lib/vue.global.min.js"></script>
<script type="module" src="js/app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW 注册成功'))
            .catch(err => console.log('SW 注册失败', err));
        });
    }
</script>
</body>
</html>
